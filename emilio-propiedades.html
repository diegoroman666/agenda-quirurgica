<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoPro Chile - Portal de Propiedades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .property-card:hover .property-image {
            transform: scale(1.05);
        }
    </style>
</head>

<body class="bg-[#F8FAFC] text-slate-900 min-h-screen custom-scrollbar">

    <!-- Notificaciones Toast -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] space-y-3"></div>

    <!-- App Wrapper -->
    <div id="app">
        <!-- Barra de Navegación Premium -->
        <nav class="sticky top-0 z-50 glass border-b border-slate-200/60 px-6 py-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3 cursor-pointer group" onclick="app.setView('home')">
                    <div
                        class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200 group-hover:rotate-3 transition-transform">
                        <i data-lucide="building-2" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <span class="text-xl font-extrabold tracking-tight text-slate-900 block leading-none">Inmo<span
                                class="text-indigo-600">Pro</span></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Chile</span>
                    </div>
                </div>

                <div class="flex items-center space-x-8">
                    <div class="hidden lg:flex space-x-6 text-sm font-bold text-slate-500">
                        <button onclick="app.setView('home')"
                            class="hover:text-indigo-600 transition flex items-center space-x-2">
                            <i data-lucide="search" class="w-4 h-4"></i> <span>Explorar</span>
                        </button>
                        <button onclick="app.setView('favorites')"
                            class="hover:text-indigo-600 transition flex items-center space-x-2">
                            <i data-lucide="heart" class="w-4 h-4"></i> <span>Favoritos</span>
                        </button>
                        <button onclick="app.setView('appointments')"
                            class="hover:text-indigo-600 transition flex items-center space-x-2">
                            <i data-lucide="calendar-check" class="w-4 h-4"></i> <span>Mis Citas</span>
                        </button>
                    </div>

                    <div class="flex items-center space-x-4 border-l border-slate-200 pl-8">
                        <div class="text-right hidden sm:block">
                            <p class="text-xs font-bold text-slate-400 uppercase">Valor UF</p>
                            <p id="uf-nav-display" class="text-sm font-black text-indigo-600">Cargando...</p>
                        </div>
                        <div
                            class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-500 shadow-md flex items-center justify-center text-white font-bold cursor-pointer">
                            JD
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="max-w-7xl mx-auto p-4 md:p-8" id="main-content">
            <!-- El contenido dinámico se inyecta aquí -->
        </main>
    </div>

    <!-- Scripts de Lógica -->
    <script>
        const INITIAL_PROPERTIES = [
            {
                id: 1,
                title: "Casa Mediterránea en Piedra Roja",
                description: "Exclusiva casa con arquitectura mediterránea. Cuenta con 5 dormitorios, sala de estar, quincho techado y piscina de sal. Eficiencia energética con paneles solares instalados.",
                type: "CASA",
                commune: "Chicureo",
                region: "Metropolitana",
                rooms: 5,
                bathrooms: 4,
                sqm: 320,
                parking: true,
                price_uf: 18500,
                image: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=800",
                broker: "Andrés Valdivia",
                status: "Venta"
            },
            {
                id: 2,
                title: "Penthouse Dúplex - El Golf",
                description: "Impresionante penthouse con vista 360 al cerro San Cristóbal y cordillera. Finas terminaciones, piso de ingeniería y cocina equipada Miele.",
                type: "DEPTO",
                commune: "Las Condes",
                region: "Metropolitana",
                rooms: 3,
                bathrooms: 3,
                sqm: 185,
                parking: true,
                price_uf: 14200,
                image: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=800",
                broker: "María José Paz",
                status: "Oportunidad"
            },
            {
                id: 3,
                title: "Terreno Agrícola Valle del Elqui",
                description: "5 hectáreas con derechos de agua. Ideal para proyecto turístico o vitivinícola. Incluye casa de cuidador y bodega.",
                type: "TERRENO",
                commune: "Vicuña",
                region: "Coquimbo",
                rooms: null,
                bathrooms: null,
                sqm: 50000,
                parking: false,
                price_uf: 8900,
                image: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=800",
                broker: "Carlos Schmidt",
                status: "Venta"
            },
            {
                id: 4,
                title: "Depto Estudio - Santiago Centro",
                description: "Ideal inversionista. Ubicado a pasos de Metro Santa Lucía. Edificio cuenta con gimnasio, lavandería y quinchos.",
                type: "DEPTO",
                commune: "Santiago",
                region: "Metropolitana",
                rooms: 1,
                bathrooms: 1,
                sqm: 32,
                parking: false,
                price_uf: 2150,
                image: "https://images.unsplash.com/photo-1493809842364-78817add7ffb?auto=format&fit=crop&q=80&w=800",
                broker: "María José Paz",
                status: "Venta"
            }
        ];

        class RealEstateApp {
            constructor() {
                // Persistencia local
                this.properties = [...INITIAL_PROPERTIES];
                this.favorites = JSON.parse(localStorage.getItem('inmo_favs')) || [];
                this.appointments = JSON.parse(localStorage.getItem('inmo_apps')) || [];

                this.ufValue = 37542.12; // Valor base
                this.currentView = 'home';
                this.filters = { type: '', commune: '', parking: false };

                this.init();
            }

            async init() {
                await this.fetchUF();
                document.getElementById('uf-nav-display').innerText = `$${Math.round(this.ufValue).toLocaleString('es-CL')}`;
                this.render();
            }

            async fetchUF() {
                try {
                    const res = await fetch('https://mindicador.cl/api/uf');
                    const data = await res.json();
                    this.ufValue = data.serie[0].valor;
                } catch (e) {
                    this.showToast("Usando valor UF referencial", "info");
                }
            }

            // --- Lógica de Negocio ---
            formatCLP(uf) {
                return new Intl.NumberFormat('es-CL', {
                    style: 'currency',
                    currency: 'CLP',
                    maximumFractionDigits: 0
                }).format(uf * this.ufValue);
            }

            toggleFavorite(id) {
                const idx = this.favorites.indexOf(id);
                if (idx > -1) {
                    this.favorites.splice(idx, 1);
                    this.showToast("Eliminado de favoritos", "info");
                } else {
                    this.favorites.push(id);
                    this.showToast("Guardado en favoritos", "success");
                }
                localStorage.setItem('inmo_favs', JSON.stringify(this.favorites));
                this.render();
            }

            scheduleVisit(e, propId) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const prop = this.properties.find(p => p.id === propId);

                const newVisit = {
                    id: Date.now(),
                    property: prop,
                    date: formData.get('date'),
                    time: formData.get('time'),
                    message: formData.get('message'),
                    status: 'Pendiente'
                };

                this.appointments.push(newVisit);
                localStorage.setItem('inmo_apps', JSON.stringify(this.appointments));
                this.showToast("Cita solicitada con éxito", "success");
                this.setView('appointments');
            }

            cancelAppointment(id) {
                this.appointments = this.appointments.filter(a => a.id !== id);
                localStorage.setItem('inmo_apps', JSON.stringify(this.appointments));
                this.showToast("Cita cancelada", "info");
                this.render();
            }

            // --- Vistas ---
            setView(view) {
                this.currentView = view;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.render();
            }

            render() {
                const container = document.getElementById('main-content');
                container.innerHTML = '';

                switch (this.currentView) {
                    case 'home': this.renderCatalog(container); break;
                    case 'favorites': this.renderFavorites(container); break;
                    case 'appointments': this.renderAppointments(container); break;
                    default:
                        if (this.currentView.startsWith('detail-')) {
                            this.renderDetail(container, parseInt(this.currentView.split('-')[1]));
                        }
                }
                lucide.createIcons();
            }

            renderCatalog(container) {
                const filtered = this.properties.filter(p => {
                    if (this.filters.type && p.type !== this.filters.type) return false;
                    if (this.filters.parking && !p.parking) return false;
                    if (this.filters.commune && !p.commune.toLowerCase().includes(this.filters.commune.toLowerCase())) return false;
                    return true;
                });

                container.innerHTML = `
                    <div class="mb-12">
                        <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Encuentra tu próximo hogar</h1>
                        <p class="text-slate-500 font-medium italic">Explora las mejores propiedades en venta en todo Chile.</p>
                    </div>

                    <!-- Filtros Avanzados -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-10 grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Ubicación</label>
                            <div class="relative">
                                <i data-lucide="map-pin" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                                <input type="text" placeholder="Ej: Las Condes..." oninput="app.filters.commune = this.value; app.render()" 
                                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 text-sm">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Tipo</label>
                            <select onchange="app.filters.type = this.value; app.render()" class="w-full bg-slate-50 border-none rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 text-sm font-medium">
                                <option value="">Cualquier tipo</option>
                                <option value="CASA" ${this.filters.type === 'CASA' ? 'selected' : ''}>Casas</option>
                                <option value="DEPTO" ${this.filters.type === 'DEPTO' ? 'selected' : ''}>Departamentos</option>
                                <option value="TERRENO" ${this.filters.type === 'TERRENO' ? 'selected' : ''}>Terrenos</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-3 pb-3">
                            <input type="checkbox" id="check-parking" onchange="app.filters.parking = this.checked; app.render()" ${this.filters.parking ? 'checked' : ''} 
                                class="w-5 h-5 rounded-lg border-slate-300 text-indigo-600 focus:ring-indigo-500">
                            <label for="check-parking" class="text-sm font-bold text-slate-600 cursor-pointer">Estacionamiento</label>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-300 uppercase mb-1">Resultados</p>
                            <span class="text-lg font-extrabold text-slate-700">${filtered.length} propiedades</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${filtered.map(p => this.createPropertyCard(p)).join('')}
                    </div>
                `;
            }

            createPropertyCard(p) {
                const isFav = this.favorites.includes(p.id);
                return `
                    <div class="property-card bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 group border border-slate-100/50">
                        <div class="relative h-64 overflow-hidden">
                            <img src="${p.image}" class="property-image w-full h-full object-cover transition-transform duration-700">
                            <div class="absolute top-5 left-5 flex space-x-2">
                                <span class="bg-white/95 backdrop-blur px-3 py-1.5 rounded-xl text-[10px] font-black text-indigo-600 uppercase tracking-widest shadow-sm">
                                    ${p.status}
                                </span>
                            </div>
                            <button onclick="app.toggleFavorite(${p.id})" class="absolute top-5 right-5 w-11 h-11 rounded-2xl bg-white/90 backdrop-blur flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-all">
                                <i data-lucide="heart" class="w-5 h-5 ${isFav ? 'fill-red-500 text-red-500' : 'text-slate-400'}"></i>
                            </button>
                        </div>
                        <div class="p-7">
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="font-extrabold text-xl text-slate-800 group-hover:text-indigo-600 transition-colors leading-tight">${p.title}</h3>
                            </div>
                            <p class="text-slate-400 text-sm mb-5 flex items-center font-medium">
                                <i data-lucide="map-pin" class="w-4 h-4 mr-1.5 text-indigo-400"></i> ${p.commune}, ${p.region}
                            </p>
                            
                            <div class="flex items-center space-x-5 mb-7 bg-slate-50 p-3 rounded-2xl">
                                ${p.rooms ? `<div class="text-center flex-1 border-r border-slate-200"><p class="text-[10px] font-bold text-slate-400 uppercase">Dorm.</p><p class="text-sm font-black text-slate-700">${p.rooms}</p></div>` : ''}
                                ${p.sqm ? `<div class="text-center flex-1 border-r border-slate-200"><p class="text-[10px] font-bold text-slate-400 uppercase">m²</p><p class="text-sm font-black text-slate-700">${p.sqm}</p></div>` : ''}
                                <div class="text-center flex-1"><p class="text-[10px] font-bold text-slate-400 uppercase">Estac.</p><p class="text-sm font-black text-slate-700">${p.parking ? 'Sí' : 'No'}</p></div>
                            </div>

                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Precio</p>
                                    <p class="text-2xl font-black text-slate-900 leading-none">UF ${p.price_uf.toLocaleString('es-CL')}</p>
                                    <p class="text-sm font-bold text-indigo-500 mt-1">${this.formatCLP(p.price_uf)}</p>
                                </div>
                                <button onclick="app.setView('detail-${p.id}')" class="bg-slate-900 text-white p-3 rounded-2xl hover:bg-indigo-600 transition-colors">
                                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderDetail(container, id) {
                const p = this.properties.find(prop => prop.id === id);
                if (!p) return;

                container.innerHTML = `
                    <button onclick="app.setView('home')" class="flex items-center text-slate-400 font-bold text-xs uppercase tracking-widest mb-8 hover:text-indigo-600 transition-colors">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Volver al catálogo
                    </button>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                        <!-- Galería e Info -->
                        <div class="lg:col-span-8 space-y-10">
                            <div class="rounded-[3rem] overflow-hidden h-[550px] shadow-2xl relative group">
                                <img src="${p.image}" class="w-full h-full object-cover">
                                <div class="absolute bottom-8 left-8 flex space-x-3">
                                    <button class="bg-white/90 backdrop-blur px-5 py-2.5 rounded-2xl font-bold text-sm shadow-xl flex items-center space-x-2">
                                        <i data-lucide="camera" class="w-4 h-4"></i> <span>Ver 12 fotos</span>
                                    </button>
                                </div>
                            </div>

                            <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                                <div class="flex flex-wrap justify-between items-start gap-4 mb-8">
                                    <div>
                                        <span class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest mb-4 inline-block">
                                            ${p.type} EN VENTA
                                        </span>
                                        <h1 class="text-4xl font-extrabold text-slate-900 mb-2 leading-tight">${p.title}</h1>
                                        <p class="text-slate-400 flex items-center font-semibold">
                                            <i data-lucide="map-pin" class="w-5 h-5 mr-2 text-indigo-400"></i> ${p.commune}, ${p.region}, Chile
                                        </p>
                                    </div>
                                    <div class="bg-slate-50 p-6 rounded-[2rem] text-right">
                                        <p class="text-3xl font-black text-slate-900 tracking-tight leading-none mb-1">UF ${p.price_uf.toLocaleString('es-CL')}</p>
                                        <p class="text-lg font-bold text-indigo-600">${this.formatCLP(p.price_uf)}</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 py-8 border-y border-slate-100 mb-8">
                                    <div class="text-center">
                                        <i data-lucide="bed" class="w-6 h-6 mx-auto mb-2 text-slate-400"></i>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Dormitorios</span>
                                        <span class="text-lg font-bold">${p.rooms || '-'}</span>
                                    </div>
                                    <div class="text-center">
                                        <i data-lucide="bath" class="w-6 h-6 mx-auto mb-2 text-slate-400"></i>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Baños</span>
                                        <span class="text-lg font-bold">${p.bathrooms || '-'}</span>
                                    </div>
                                    <div class="text-center">
                                        <i data-lucide="maximize" class="w-6 h-6 mx-auto mb-2 text-slate-400"></i>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Superficie</span>
                                        <span class="text-lg font-bold">${p.sqm ? p.sqm + ' m²' : '-'}</span>
                                    </div>
                                    <div class="text-center">
                                        <i data-lucide="car" class="w-6 h-6 mx-auto mb-2 text-slate-400"></i>
                                        <span class="block text-[10px] font-black text-slate-400 uppercase">Estac.</span>
                                        <span class="text-lg font-bold">${p.parking ? 'Sí' : 'No'}</span>
                                    </div>
                                </div>

                                <h3 class="text-xl font-bold mb-4 text-slate-800">Descripción detallada</h3>
                                <p class="text-slate-500 leading-relaxed text-lg mb-10">${p.description}</p>

                                <!-- Simulador Hipotecario -->
                                <div class="bg-indigo-600 rounded-[2.5rem] p-10 text-white relative overflow-hidden">
                                    <div class="relative z-10">
                                        <h4 class="text-2xl font-black mb-2">Simulador de Dividendo</h4>
                                        <p class="text-indigo-100/80 text-sm mb-8 font-medium italic">Estimación basada en tasa del 4.5% anual a 20 años.</p>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div class="bg-white/10 backdrop-blur p-6 rounded-3xl border border-white/20">
                                                <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Dividendo Mensual (UF)</p>
                                                <p class="text-4xl font-black">UF ${(p.price_uf * 0.0063).toFixed(2)}</p>
                                            </div>
                                            <div class="bg-white/10 backdrop-blur p-6 rounded-3xl border border-white/20">
                                                <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Dividendo en Pesos (CLP)</p>
                                                <p class="text-4xl font-black">${this.formatCLP(p.price_uf * 0.0063)}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <i data-lucide="calculator" class="absolute -bottom-6 -right-6 w-48 h-48 opacity-10 rotate-12"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Sidebar de Acción -->
                        <div class="lg:col-span-4">
                            <div class="sticky top-28 space-y-6">
                                <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
                                    <h3 class="text-2xl font-black mb-6 text-slate-800 leading-tight">Agendar una visita</h3>
                                    <form onsubmit="app.scheduleVisit(event, ${p.id})" class="space-y-4">
                                        <div class="grid grid-cols-2 gap-4">
                                            <div class="space-y-2">
                                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Fecha</label>
                                                <input type="date" name="date" required class="w-full bg-slate-50 border-none rounded-2xl p-3.5 focus:ring-2 focus:ring-indigo-500 text-sm font-medium">
                                            </div>
                                            <div class="space-y-2">
                                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Hora</label>
                                                <input type="time" name="time" required class="w-full bg-slate-50 border-none rounded-2xl p-3.5 focus:ring-2 focus:ring-indigo-500 text-sm font-medium">
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Nota adicional</label>
                                            <textarea name="message" rows="3" class="w-full bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" placeholder="Escribe tus dudas..."></textarea>
                                        </div>
                                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-[1.5rem] font-black hover:bg-indigo-700 transition shadow-xl shadow-indigo-200">
                                            Confirmar Cita
                                        </button>
                                    </form>

                                    <div class="mt-8 pt-8 border-t border-slate-100 flex items-center justify-between">
                                        <div class="flex items-center space-x-4">
                                            <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
                                                <i data-lucide="user"></i>
                                            </div>
                                            <div>
                                                <p class="font-black text-slate-800 leading-none mb-1">${p.broker}</p>
                                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ejecutivo de ventas</p>
                                            </div>
                                        </div>
                                        <a href="https://wa.me/56900000000?text=Me interesa la propiedad: ${p.title}" target="_blank" 
                                            class="p-3 bg-green-50 text-green-600 rounded-2xl hover:bg-green-600 hover:text-white transition-all">
                                            <i data-lucide="message-circle" class="w-6 h-6"></i>
                                        </a>
                                    </div>
                                </div>

                                <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white">
                                    <div class="flex items-center space-x-3 mb-4">
                                        <div class="bg-amber-400 p-2 rounded-xl text-slate-900">
                                            <i data-lucide="star" class="w-5 h-5 fill-slate-900"></i>
                                        </div>
                                        <h4 class="font-bold">Portal Verificado</h4>
                                    </div>
                                    <p class="text-sm text-slate-400 leading-relaxed">Esta propiedad ha sido verificada físicamente por nuestro equipo legal en Chile.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderFavorites(container) {
                const favs = this.properties.filter(p => this.favorites.includes(p.id));
                container.innerHTML = `
                    <div class="mb-12">
                        <h2 class="text-4xl font-extrabold text-slate-900 mb-2 leading-none tracking-tight">Tus Favoritos</h2>
                        <p class="text-slate-500 font-medium">Propiedades guardadas para revisar más tarde.</p>
                    </div>
                `;

                if (favs.length === 0) {
                    container.innerHTML += `
                        <div class="bg-white p-20 rounded-[3rem] text-center border-2 border-dashed border-slate-100">
                            <div class="bg-slate-50 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-slate-300">
                                <i data-lucide="heart-off" class="w-10 h-10"></i>
                            </div>
                            <p class="text-slate-400 font-bold text-xl">Aún no has guardado nada.</p>
                            <button onclick="app.setView('home')" class="mt-6 text-indigo-600 font-black uppercase text-xs tracking-widest hover:underline">Explorar ahora</button>
                        </div>
                    `;
                } else {
                    const grid = document.createElement('div');
                    grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8";
                    grid.innerHTML = favs.map(p => this.createPropertyCard(p)).join('');
                    container.appendChild(grid);
                }
            }

            renderAppointments(container) {
                container.innerHTML = `
                    <div class="flex justify-between items-end mb-12">
                        <div>
                            <h2 class="text-4xl font-extrabold text-slate-900 mb-2 leading-none tracking-tight">Mis Visitas</h2>
                            <p class="text-slate-500 font-medium italic">Gestión de tus citas con corredores.</p>
                        </div>
                        <div class="bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm">
                            <span class="text-xs font-black text-slate-300 uppercase tracking-widest mr-3">Total</span>
                            <span class="text-xl font-black text-indigo-600">${this.appointments.length}</span>
                        </div>
                    </div>
                `;

                if (this.appointments.length === 0) {
                    container.innerHTML += `
                        <div class="bg-white p-20 rounded-[3rem] text-center">
                            <p class="text-slate-400 font-bold text-lg italic">No tienes visitas agendadas próximamente.</p>
                        </div>
                    `;
                } else {
                    const list = document.createElement('div');
                    list.className = "space-y-6";
                    this.appointments.forEach(a => {
                        const dateObj = new Date(a.date);
                        list.innerHTML += `
                            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row items-start md:items-center justify-between gap-8 hover:shadow-xl transition-shadow">
                                <div class="flex items-center space-x-8">
                                    <div class="bg-slate-900 text-white w-20 h-24 rounded-[2rem] flex flex-col items-center justify-center shadow-lg shadow-slate-200">
                                        <span class="text-[10px] font-black uppercase opacity-60 tracking-widest mb-1">${dateObj.toLocaleDateString('es-ES', { month: 'short' })}</span>
                                        <span class="text-3xl font-black">${a.date.split('-')[2]}</span>
                                    </div>
                                    <div>
                                        <span class="inline-block bg-amber-50 text-amber-600 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-lg mb-2">
                                            <i data-lucide="circle" class="w-2 h-2 inline-block mr-1 fill-amber-600"></i> ${a.status}
                                        </span>
                                        <h4 class="font-extrabold text-xl text-slate-800 mb-1">${a.property.title}</h4>
                                        <div class="flex flex-wrap gap-4 mt-2">
                                            <span class="text-xs font-bold text-slate-400 flex items-center uppercase tracking-widest"><i data-lucide="clock" class="w-3.5 h-3.5 mr-1.5 text-indigo-400"></i> ${a.time}</span>
                                            <span class="text-xs font-bold text-slate-400 flex items-center uppercase tracking-widest"><i data-lucide="user" class="w-3.5 h-3.5 mr-1.5 text-indigo-400"></i> ${a.property.broker}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex space-x-3 w-full md:w-auto">
                                    <button onclick="app.setView('detail-${a.property.id}')" class="flex-1 md:flex-none px-6 py-3 bg-slate-50 text-slate-600 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-100 transition">Detalles</button>
                                    <button onclick="app.cancelAppointment(${a.id})" class="p-4 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    container.appendChild(list);
                }
            }

            showToast(msg, type = 'info') {
                const toast = document.createElement('div');
                const colors = {
                    success: 'bg-green-600',
                    info: 'bg-indigo-600',
                    error: 'bg-red-600'
                };
                toast.className = `${colors[type]} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center space-x-3 animate-bounce shadow-indigo-200`;
                toast.innerHTML = `<i data-lucide="bell" class="w-5 h-5"></i> <span class="font-bold text-sm">${msg}</span>`;
                document.getElementById('toast-container').appendChild(toast);
                lucide.createIcons();
                setTimeout(() => toast.remove(), 3000);
            }
        }

        const app = new RealEstateApp();
    </script>
</body>

</html>
